<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cart page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        #cart-item {
            display: flex;
            align-items: center;
            background: #fff;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
        }

        #cart-item img {
            width: 90px;
            border-radius: 10px;
        }

        #details {
            flex: 1;
            margin-left: 20px;
        }

        #price {
            font-weight: bold;
        }



        #remove {
            color: red;
            margin-left: 15px;
            cursor: pointer;
        }

        .summary {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .summary p {
            display: flex;
            justify-content: space-between;
        }

        .checkout {
            width: 100%;
            padding: 10px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <h1> cart items</h1>


    <div class="container" id="container">
        <h1>🛒 Your Cart</h1>

        <!-- Item 1 -->
        <!-- <div class="cart-item">
            <img src="https://picsum.photos/100?1">
            <div class="details">
                <h3>Product 1</h3>
                <p class="price">₹500</p>
            </div>

            <p>₹500</p>
            <span class="remove">❌</span>
        </div> -->

        
    </div>
    
    <!-- Summary -->
    <div class="summary">
        <h2>Summary</h2>
        <p><span>Subtotal</span><span id="totalamount"></span></p>
        <p><span>Delivery</span><span>Free</span></p>
        <p><strong>Total</strong><strong id="totalamount2"></strong></p>

        <button class="checkout">Proceed to Checkout</button>
    </div>





    <script src="./cart.js"></script>
</body>

</html>
