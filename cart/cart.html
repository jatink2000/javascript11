<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .cart {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .cart-items {
            flex: 2;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
        }

        .item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }

        .item img {
            width: 80px;
            border-radius: 8px;
        }

        .details {
            flex: 1;
            margin-left: 15px;
        }

        .qty {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            padding: 5px 10px;
            border: none;
            background: #000;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
        }

        .remove {
            background: red;
        }

        .summary {
            flex: 1;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            height: fit-content;
        }

        .summary h3 {
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }

        .summary p {
            display: flex;
            justify-content: space-between;
        }

        .checkout {
            width: 100%;
            padding: 10px;
            background: green;
            margin-top: 10px;
        }
    </style>
</head>

<body>


    


    <script src="./cart.js"></script>
</body>

</html>
